# Chromium do sistema para o whatsapp-web.js (servico de WhatsApp nao oficial).
# O pacote "chromium" do apt nesse Ubuntu eh so um stub que exige snap (que
# nao existe no container), entao usamos o pacote do Nix mesmo (real build
# standalone). PUPPETEER_SKIP_DOWNLOAD evita baixar o Chromium embutido do
# puppeteer; o caminho exato do binario do Nix varia (hash no nome), entao
# o codigo resolve via `which chromium` em runtime (ver services/whatsapp.ts).
[phases.setup]
nixPkgs = ["chromium"]

[variables]
PUPPETEER_SKIP_DOWNLOAD = "true"
