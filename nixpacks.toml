# O Nixpacks detecta puppeteer/whatsapp-web.js automaticamente e instala via
# apt as libs de sistema necessarias (libnss3, libgbm1 etc) MAIS um pacote
# "chromium" que nesse Ubuntu e so um stub que exige snap (nao funciona em
# container: "requires the chromium snap to be installed"). Por isso aqui so
# garantimos que o puppeteer baixe o proprio Chromium funcional (variavel
# default do puppeteer; nao mexer no nixPkgs do setup, que tira o nodejs/npm).
[variables]
PUPPETEER_SKIP_DOWNLOAD = "false"
